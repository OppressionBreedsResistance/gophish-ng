site_name: Gophish-NG
site_description: Documentation for Gophish-NG — an extended fork of the Gophish phishing framework
site_url: https://oppressionbreedsresistance.github.io/gophish-ng
repo_url: https://github.com/OppressionBreedsResistance/gophish-ng
repo_name: gophish-ng
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Campaigns: user-guide/campaigns.md
    - Email Templates: user-guide/email-templates.md
    - Attachments: user-guide/attachments.md
    - Campaign Results: user-guide/campaign-results.md
  - Features:
    - Attachment Tracking: features/attachment-tracking.md
    - IOC Removal: features/ioc-removal.md
    - Password-Protected ZIP: features/password-zip.md
    - QR Code Placeholder: features/qr-code.md
